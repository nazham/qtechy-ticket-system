<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    
    <!-- Ticket Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base Rounded Squircle -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg-grad)" />

  <!-- Glowing Ticket Icon -->
  <g filter="url(#glow)">
    <path d="M36,44 
             C36,41.8 37.8,40 40,40 
             L88,40 
             C90.2,40 92,41.8 92,44 
             L92,56 
             C86.5,56 82,60.5 82,66 
             C82,71.5 86.5,76 92,76 
             L92,88 
             C92,90.2 90.2,92 88,92 
             L40,92 
             C37.8,92 36,90.2 36,88 
             L36,76 
             C41.5,76 46,71.5 46,66 
             C46,60.5 41.5,56 36,56 
             Z" 
          fill="#ffffff" />
    
    <!-- Ticket Perforation Line -->
    <line x1="64" y1="48" x2="64" y2="84" stroke="#4f46e5" stroke-width="4" stroke-linecap="round" stroke-dasharray="2,6" />
  </g>
</svg>
